<!DOCTYPE html>
<html>

<head>
    <title>DOJ Charges v1</title>

    <style>
.container {
    padding: 30px;
}


details {
    background: #1c1c1c;
    margin-bottom: 15px;
    border-radius: 8px;
    padding: 10px;
}


summary {
    cursor: pointer;
    font-size: 24px;
    font-weight: bold;
    padding: 15px;
    color: white;
}


details[open] summary {
    border-bottom: 1px solid #444;
}


.charge {
    background: #111;
    margin: 10px;
    padding: 15px;
    border-radius: 6px;
}


.charge h3 {
    margin-top: 0;
}
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            background: #0b1f3a;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 3px solid #162f55;
        }

        header h1 {
            font-size: 42px;
            margin: 0;
        }

        header p {
            font-size: 18px;
            color: #c9d6e8;
            margin-top: 10px;
        }

    </style>

</head>


<body>

    <header>
        <h1>Department of Justice</h1>
        <p>Criminal Code Database</p>
    </header>
<div class="container">

    <!-- Violent Crimes -->
    <details>
        <summary>Violent Crimes</summary>

        <div class="charge">
            <h3>Charge Name</h3>
            <p>
                Fine: $0<br>
                Time: 0 Months<br>
                Type: Principal
            </p>
        </div>

    </details>


    <!-- Property Crimes -->
    <details>
        <summary>Property Crimes</summary>

        <div class="charge">
            <h3>Charge Name</h3>
            <p>
                Fine: $0<br>
                Time: 0 Months<br>
                Type: Principal
            </p>
        </div>

    </details>


    <!-- Weapons Offences -->
    <details>
        <summary>Weapons Offences</summary>

        <div class="charge">
            <h3>Charge Name</h3>
            <p>
                Fine: $0<br>
                Time: 0 Months<br>
                Type: Principal
            </p>
        </div>

    </details>


</div>

</body>

</html>
